# Manifest du corpus ANSSI — llm-verification-harness / Brique 1
#
# Contrat de non-altération : chaque PDF est identifié par son SHA256.
# download_corpus.py refuse de continuer en cas de mismatch (hash calculé
# != hash déclaré ici) — dérive silencieuse du corpus interdite.
#
# Sémantique des URLs
#   download_url  : URL directe et stable vers le PDF (téléchargement auto)
#                   null quand la source n'expose pas d'URL directe stable.
#   landing_page  : URL humaine (page de présentation ANSSI) — pour le
#                   fallback manuel et pour la traçabilité VCD.
#   signed_url    : true quand la source est derrière un S3 présigné (OVH
#                   `sf-cyber`, expiration ~1h). Dans ce cas download_url
#                   est null et le script demande un téléchargement manuel
#                   depuis landing_page.
#
# Identité stable
#   doc_id : slug court immuable. C'est LUI qui identifie un document dans
#            les chunks, les cas de test et le VCD — pas le filename.
#            Un renommage de filename ne casse jamais la traçabilité amont.
#
# Champs sous contrat (gelés, toute divergence est une régression IVVQ)
#   sha256 : non-altération binaire du PDF (vérifiée par download_corpus.py)
#   bytes  : taille du fichier sur disque en octets (sanity check amont
#            pour les 3 docs signed_url dont le téléchargement est manuel)
#   pages  : nombre de pages du PDF (invariant `page_ref <= pages` exploité
#            par la vérification de provenance des chunks — Brique 2/3)
#
# Champs informatifs (peuvent être édités sans casser le contrat)
#   title, filename, downloaded_at, download_url, landing_page, signed_url

